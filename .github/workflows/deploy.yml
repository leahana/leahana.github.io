name: Deploy to GitHub Pages

on:
  push:
    branches: [hexo]
    # 后期如需避免 CHANGELOG.md/cliff.toml 更新触发无意义部署，可取消下方注释：
    # paths-ignore:
    #   - 'CHANGELOG.md'
    #   - 'cliff.toml'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.27.0

      - name: Show tool versions
        run: |
          node --version
          pnpm --version

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build theme assets
        run: |
          cd themes/kratos-rebirth
          printf '%s\n' \
            'packages:' \
            '  - .' \
            '' \
            'onlyBuiltDependencies:' \
            '  - esbuild' > pnpm-workspace.yaml
          HUSKY=0 pnpm install
          pnpm run build

      - name: Security check - scan for secrets
        run: pnpm run check:secrets

      - name: Generate static site
        run: pnpm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true
          commit_message: 'Site updated: ${{ github.event.head_commit.message }}'
